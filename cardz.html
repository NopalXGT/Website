<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>🧠 Memory Card Flip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1rem;
            touch-action: pan-y;
        }

        .game-wrapper {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 2rem 2rem 1.8rem;
            box-shadow: 0 30px 50px -10px #000000cc, inset 0 1px 2px #ffffff18;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 620px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #f1f5f9;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        h1 span {
            background: #334155;
            padding: 0.1rem 1.2rem;
            border-radius: 60px;
            font-size: 1.4rem;
            color: #facc15;
            box-shadow: inset 0 -2px 0 #1e293b;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: #94a3b8;
            font-weight: 500;
            font-size: 1rem;
            flex-wrap: wrap;
            margin: 0.2rem 0 1rem;
        }
        .stats span {
            background: #1e293b;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            color: #e2e8f0;
            border: 1px solid #334155;
        }
        .stats .highlight {
            color: #facc15;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 0 auto 1.2rem;
            max-width: 500px;
        }

        .card {
            aspect-ratio: 1 / 1;
            perspective: 800px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 18px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
            box-shadow: 0 0 20px #4ade80, 0 6px 16px rgba(0, 0, 0, 0.4);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 700;
            user-select: none;
        }

        .card-front {
            background: linear-gradient(145deg, #3b82f6, #1d4ed8);
            border: 2px solid #60a5fa;
            color: #f1f5f9;
            transform: rotateY(180deg);
            box-shadow: inset 0 -4px 0 #1e3a8a;
        }

        .card-back {
            background: linear-gradient(145deg, #334155, #1e293b);
            border: 2px solid #475569;
            color: #94a3b8;
            transform: rotateY(0deg);
            box-shadow: inset 0 -4px 0 #0f172a;
        }
        .card-back::after {
            content: "?";
            font-size: 2.2rem;
            font-weight: 800;
            color: #64748b;
            opacity: 0.6;
        }

        /* Ukuran emoji di kartu */
        .card-front .emoji {
            font-size: 2.8rem;
            line-height: 1;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.2rem;
        }

        .btn {
            background: #334155;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
            box-shadow: 0 6px 0 #0f172a, 0 4px 12px #00000060;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #475569;
            letter-spacing: 0.5px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f172a;
        }
        .btn-primary {
            background: #2563eb;
            border-color: #60a5fa;
            box-shadow: 0 6px 0 #1e3a8a, 0 4px 12px #00000060;
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 #1e3a8a;
        }
        .btn-success {
            background: #16a34a;
            border-color: #4ade80;
            box-shadow: 0 6px 0 #14532d, 0 4px 12px #00000060;
        }
        .btn-success:active {
            box-shadow: 0 2px 0 #14532d;
        }

        .message {
            text-align: center;
            color: #facc15;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0.6rem;
            min-height: 2rem;
        }

        @media (max-width: 480px) {
            .game-wrapper { padding: 1rem; }
            h1 { font-size: 1.6rem; }
            .board { gap: 8px; }
            .card-front .emoji { font-size: 2rem; }
            .card-back::after { font-size: 1.6rem; }
            .btn { padding: 0.6rem 1.2rem; font-size: 1rem; }
            .stats { gap: 1rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <h1>
        🧠
        <span>MEMORY</span>
        🃏
    </h1>

    <div class="stats">
        <span>🔄 <span id="movesDisplay" class="highlight">0</span></span>
        <span>⏱️ <span id="timerDisplay" class="highlight">0</span>s</span>
        <span>✅ <span id="pairsDisplay" class="highlight">0</span>/8</span>
    </div>

    <div class="board" id="board"></div>

    <div class="message" id="message"></div>

    <div class="controls">
        <button class="btn btn-primary" id="resetBtn">⟳ Reset</button>
        <button class="btn btn-success" id="newGameBtn">✨ Game Baru</button>
    </div>
</div>

<script>
    (function() {
        // ----- KONFIGURASI -----
        const EMOJIS = [
            '🚀', '🦕', '🌈', '⭐', '🎯', '🧠', '🔥', '💎'
        ];
        const TOTAL_PAIRS = EMOJIS.length; // 8
        const TOTAL_CARDS = TOTAL_PAIRS * 2; // 16

        // ----- STATE -----
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let isLocked = false;
        let gameFinished = false;

        // DOM
        const board = document.getElementById('board');
        const movesDisplay = document.getElementById('movesDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const pairsDisplay = document.getElementById('pairsDisplay');
        const message = document.getElementById('message');

        // ----- FUNGSI BANTU -----
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ----- INISIALISASI -----
        function initGame() {
            // Reset state
            clearInterval(timerInterval);
            timerInterval = null;
            timer = 0;
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            isLocked = false;
            gameFinished = false;
            message.textContent = '';

            // Buat deck kartu
            let deck = [];
            for (let i = 0; i < TOTAL_PAIRS; i++) {
                deck.push({ id: i, emoji: EMOJIS[i] });
                deck.push({ id: i, emoji: EMOJIS[i] });
            }
            shuffle(deck);

            cards = deck.map((item, index) => ({
                index: index,
                id: item.id,
                emoji: item.emoji,
                isFlipped: false,
                isMatched: false
            }));

            renderBoard();
            updateStats();
            timerDisplay.textContent = '0';
        }

        // ----- RENDER BOARD -----
        function renderBoard() {
            board.innerHTML = '';
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                if (card.isFlipped || card.isMatched) {
                    cardEl.classList.add('flipped');
                }
                if (card.isMatched) {
                    cardEl.classList.add('matched');
                }
                cardEl.dataset.index = index;

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const front = document.createElement('div');
                front.className = 'card-front';
                front.innerHTML = `<span class="emoji">${card.emoji}</span>`;

                const back = document.createElement('div');
                back.className = 'card-back';

                inner.appendChild(front);
                inner.appendChild(back);
                cardEl.appendChild(inner);

                cardEl.addEventListener('click', () => onCardClick(index));
                cardEl.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    onCardClick(index);
                }, { passive: false });

                board.appendChild(cardEl);
            });
        }

        // ----- UPDATE TAMPILAN KARTU (tanpa re-render penuh) -----
        function updateCardElement(index) {
            const cardEl = board.children[index];
            if (!cardEl) return;
            const card = cards[index];
            cardEl.className = 'card';
            if (card.isFlipped || card.isMatched) {
                cardEl.classList.add('flipped');
            }
            if (card.isMatched) {
                cardEl.classList.add('matched');
            }
        }

        // ----- UPDATE STATS -----
        function updateStats() {
            movesDisplay.textContent = moves;
            pairsDisplay.textContent = `${matchedPairs}/${TOTAL_PAIRS}`;
        }

        // ----- TIMER -----
        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                timer++;
                timerDisplay.textContent = timer;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        // ----- CEK MENANG -----
        function checkWin() {
            if (matchedPairs === TOTAL_PAIRS) {
                stopTimer();
                gameFinished = true;
                message.textContent = `🎉 Selamat! Selesai dalam ${moves} langkah dan ${timer} detik! 🎉`;
                return true;
            }
            return false;
        }

        // ----- LOGIKA KLIK KARTU -----
        function onCardClick(index) {
            // Cegah jika game selesai, terkunci, atau kartu sudah cocok / terbuka
            if (gameFinished) return;
            if (isLocked) return;

            const card = cards[index];
            if (card.isMatched) return;
            if (card.isFlipped) return;

            // Jika ini kartu pertama yang dibuka, mulai timer
            if (flippedCards.length === 0 && matchedPairs === 0 && moves === 0) {
                startTimer();
            }

            // Flip kartu
            card.isFlipped = true;
            updateCardElement(index);
            flippedCards.push(index);

            // Jika dua kartu terbuka
            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                isLocked = true;

                const idx1 = flippedCards[0];
                const idx2 = flippedCards[1];
                const card1 = cards[idx1];
                const card2 = cards[idx2];

                if (card1.id === card2.id) {
                    // Cocok!
                    card1.isMatched = true;
                    card2.isMatched = true;
                    matchedPairs++;
                    updateStats();
                    // Update tampilan ke matched (tetap flipped)
                    updateCardElement(idx1);
                    updateCardElement(idx2);

                    flippedCards = [];
                    isLocked = false;

                    // Cek menang
                    checkWin();
                } else {
                    // Tidak cocok, balik lagi setelah delay
                    setTimeout(() => {
                        card1.isFlipped = false;
                        card2.isFlipped = false;
                        updateCardElement(idx1);
                        updateCardElement(idx2);
                        flippedCards = [];
                        isLocked = false;
                    }, 700);
                }
            }
        }

        // ----- RESET / GAME BARU -----
        function resetGame() {
            stopTimer();
            initGame();
        }

        // ----- EVENT LISTENER TOMBOL -----
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('newGameBtn').addEventListener('click', resetGame);

        // ----- MULAI -----
        initGame();

        // Console hint
        console.log('🧠 Memory Card Flip! Klik kartu untuk membuka, cari pasangan.');
    })();
</script>
</body>
</html>
